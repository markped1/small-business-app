name: Build and Release ToMega POS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build APK and Publish Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Extract version info
        id: version
        working-directory: SmallBizApp/app
        run: |
          VERSION_NAME=$(grep 'versionName' build.gradle | head -1 | sed 's/.*"\(.*\)".*/\1/')
          VERSION_CODE=$(grep 'versionCode' build.gradle | head -1 | grep -o '[0-9]*' | head -1)
          echo "version_name=${VERSION_NAME}" >> $GITHUB_OUTPUT
          echo "version_code=${VERSION_CODE}" >> $GITHUB_OUTPUT
          echo "tag=v${VERSION_NAME}" >> $GITHUB_OUTPUT
          echo "Version: ${VERSION_NAME} (code: ${VERSION_CODE})"

      - name: Write google-services.json
        run: |
          # google-services.json is already in the repo at SmallBizApp/app/
          # If a secret is provided, it overrides the committed file
          SECRET='${{ secrets.GOOGLE_SERVICES_JSON }}'
          if [ -n "$SECRET" ] && [ "$SECRET" != "" ]; then
            echo "$SECRET" > SmallBizApp/app/google-services.json
            echo "google-services.json overridden from secret"
          else
            echo "Using committed google-services.json"
          fi
          ls -la SmallBizApp/app/google-services.json

      - name: Download Gradle wrapper jar
        run: |
          mkdir -p SmallBizApp/gradle/wrapper
          curl -sL "https://github.com/gradle/gradle/raw/v8.4.0/gradle/wrapper/gradle-wrapper.jar" \
            -o SmallBizApp/gradle/wrapper/gradle-wrapper.jar
          chmod +x SmallBizApp/gradlew
          ls -la SmallBizApp/gradle/wrapper/

      - name: Build Debug APK
        working-directory: SmallBizApp
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false"
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Prepare APK for release
        run: |
          mkdir -p release_output
          APK_NAME="ToMegaPOS-v${{ steps.version.outputs.version_name }}.apk"
          cp SmallBizApp/app/build/outputs/apk/debug/app-debug.apk "release_output/${APK_NAME}"
          echo "APK prepared: ${APK_NAME}"
          ls -lh release_output/

      - name: Generate changelog
        id: changelog
        run: |
          LAST_TAG=$(git tag --sort=-version:refname | grep -v "^smallbusiness$" | head -1 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            NOTES=$(git log --oneline -8 --pretty=format:"- %s" 2>/dev/null || echo "- Initial release")
          else
            NOTES=$(git log "${LAST_TAG}..HEAD" --oneline --pretty=format:"- %s" 2>/dev/null || echo "- Updates and improvements")
          fi
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Delete existing release if same version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ steps.version.outputs.version_name }}"
          gh release delete "$TAG" --yes --repo ${{ github.repository }} 2>/dev/null || true
          git push origin --delete "refs/tags/${TAG}" 2>/dev/null || true
          echo "Cleaned up existing release for ${TAG}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ steps.version.outputs.version_name }}"
          APK="release_output/ToMegaPOS-v${{ steps.version.outputs.version_name }}.apk"
          BUILD_DATE=$(date -u '+%d %B %Y at %H:%M UTC')

          gh release create "$TAG" \
            --repo ${{ github.repository }} \
            --title "ToMega POS v${{ steps.version.outputs.version_name }}" \
            --notes "## ToMega POS v${{ steps.version.outputs.version_name }}

**Version Code:** ${{ steps.version.outputs.version_code }}
**Built:** ${BUILD_DATE}

### Changes
${{ steps.changelog.outputs.notes }}

### How to Install
1. Download **ToMegaPOS-v${{ steps.version.outputs.version_name }}.apk** below
2. On your Android phone: Settings > Security > Install unknown apps > Allow
3. Open the downloaded file and tap Install
4. All your existing data is preserved automatically

### Auto-Update
Phones already running ToMega POS will see an update notification on next launch." \
            --latest \
            "$APK"

          echo "Release created: $TAG"

      - name: Update smallbusiness tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git push origin --delete refs/tags/smallbusiness 2>/dev/null || true
          git tag -f smallbusiness
          git push origin refs/tags/smallbusiness --force
          echo "smallbusiness tag updated"

      - name: Job summary
        run: |
          echo "## ToMega POS v${{ steps.version.outputs.version_name }} Released" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Version | v${{ steps.version.outputs.version_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Version Code | ${{ steps.version.outputs.version_code }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Release | https://github.com/${{ github.repository }}/releases/tag/v${{ steps.version.outputs.version_name }} |" >> $GITHUB_STEP_SUMMARY
