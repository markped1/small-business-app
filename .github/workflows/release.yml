name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.4"

      - name: Get version
        id: ver
        run: |
          VN=$(grep 'versionName' SmallBizApp/app/build.gradle | head -1 | sed 's/.*"\(.*\)".*/\1/')
          VC=$(grep 'versionCode' SmallBizApp/app/build.gradle | head -1 | grep -o '[0-9]*' | head -1)
          echo "vn=${VN}" >> $GITHUB_OUTPUT
          echo "vc=${VC}" >> $GITHUB_OUTPUT
          echo "Version ${VN} (code ${VC})"

      - name: Build APK
        working-directory: SmallBizApp
        run: gradle assembleDebug --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false"

      - name: Prepare APK
        run: |
          mkdir -p out
          cp SmallBizApp/app/build/outputs/apk/debug/app-debug.apk "out/ToMegaPOS-v${{ steps.ver.outputs.vn }}.apk"
          ls -lh out/

      - name: Write release notes
        run: |
          PREV=$(git tag --sort=-version:refname | grep -v '^smallbusiness$' | head -1 || true)
          if [ -z "$PREV" ]; then
            CHANGES=$(git log --oneline -6 --pretty=format:"- %s")
          else
            CHANGES=$(git log "${PREV}..HEAD" --oneline --pretty=format:"- %s")
          fi
          DATE=$(date -u '+%d %B %Y %H:%M UTC')
          printf "## ToMega POS v%s\nVersion Code: %s\nBuilt: %s\n\n### Changes\n%s\n\n### Install\n1. Download the APK below\n2. Phone Settings > Security > Allow unknown sources\n3. Open the APK and install\n4. Your data is preserved automatically\n\nPhones already running ToMega POS will be notified automatically." \
            "${{ steps.ver.outputs.vn }}" "${{ steps.ver.outputs.vc }}" "$DATE" "$CHANGES" \
            > release_notes.md

      - name: Remove old release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=v${{ steps.ver.outputs.vn }}
          gh release delete "$TAG" --yes --repo ${{ github.repository }} 2>/dev/null || true
          git push origin --delete "refs/tags/${TAG}" 2>/dev/null || true

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=v${{ steps.ver.outputs.vn }}
          APK="out/ToMegaPOS-v${{ steps.ver.outputs.vn }}.apk"
          gh release create "$TAG" "$APK" \
            --repo "${{ github.repository }}" \
            --title "ToMega POS v${{ steps.ver.outputs.vn }}" \
            --notes-file release_notes.md \
            --latest
          echo "Released: $TAG"

      - name: Update smallbusiness tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git push origin --delete refs/tags/smallbusiness 2>/dev/null || true
          git tag -f smallbusiness
          git push origin refs/tags/smallbusiness --force
