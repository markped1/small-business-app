name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: gradle

      - name: Get version
        id: ver
        run: |
          VN=$(grep 'versionName' SmallBizApp/app/build.gradle | head -1 | sed 's/.*"\(.*\)".*/\1/')
          VC=$(grep 'versionCode' SmallBizApp/app/build.gradle | head -1 | grep -o '[0-9]*' | head -1)
          echo "vn=${VN}" >> $GITHUB_OUTPUT
          echo "vc=${VC}" >> $GITHUB_OUTPUT
          echo "Version ${VN} code ${VC}"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses 2>/dev/null || true

      - name: Install Android build tools
        run: sdkmanager "build-tools;33.0.1" "platforms;android-34" 2>/dev/null || true

      - name: Make gradlew executable
        run: chmod +x SmallBizApp/gradlew

      - name: Build APK
        working-directory: SmallBizApp
        run: ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false"
          ANDROID_HOME: /usr/local/lib/android/sdk

      - name: Prepare APK
        run: |
          mkdir -p out
          VN="${{ steps.ver.outputs.vn }}"
          cp SmallBizApp/app/build/outputs/apk/debug/app-debug.apk "out/ToMegaPOS-v${VN}.apk"
          ls -lh out/

      - name: Write release notes
        run: |
          VN="${{ steps.ver.outputs.vn }}"
          VC="${{ steps.ver.outputs.vc }}"
          PREV=$(git tag --sort=-version:refname | grep -v '^smallbusiness$' | head -1 || true)
          if [ -z "$PREV" ]; then
            CHANGES=$(git log --oneline -6 --pretty=format:"- %s")
          else
            CHANGES=$(git log "${PREV}..HEAD" --oneline --pretty=format:"- %s")
          fi
          DATE=$(date -u '+%d %B %Y %H:%M UTC')
          cat > release_notes.md << NOTES
          ## ToMega POS v${VN}
          Version Code: ${VC}
          Built: ${DATE}

          ### Changes
          ${CHANGES}

          ### How to Install
          1. Download the APK file below
          2. On your phone: Settings > Security > Allow unknown sources
          3. Open the downloaded APK and tap Install
          4. All your existing data is preserved automatically

          Phones already running ToMega POS will see an update notification on next launch.
          NOTES

      - name: Remove old release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VN="${{ steps.ver.outputs.vn }}"
          gh release delete "v${VN}" --yes --repo "${{ github.repository }}" 2>/dev/null || true
          git push origin --delete "refs/tags/v${VN}" 2>/dev/null || true

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VN="${{ steps.ver.outputs.vn }}"
          gh release create "v${VN}" \
            "out/ToMegaPOS-v${VN}.apk" \
            --repo "${{ github.repository }}" \
            --title "ToMega POS v${VN}" \
            --notes-file release_notes.md \
            --latest
          echo "Released v${VN}"

      - name: Update smallbusiness tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git push origin --delete refs/tags/smallbusiness 2>/dev/null || true
          git tag -f smallbusiness
          git push origin refs/tags/smallbusiness --force
          echo "smallbusiness tag updated"
