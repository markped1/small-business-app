name: Build and Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build APK and Publish Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: gradle

      - name: Get version
        id: ver
        working-directory: SmallBizApp/app
        run: |
          VN=$(grep 'versionName' build.gradle | head -1 | sed 's/.*"\(.*\)".*/\1/')
          VC=$(grep 'versionCode' build.gradle | head -1 | grep -o '[0-9]*' | head -1)
          echo "vn=${VN}" >> $GITHUB_OUTPUT
          echo "vc=${VC}" >> $GITHUB_OUTPUT
          echo "tag=v${VN}" >> $GITHUB_OUTPUT
          echo "Version ${VN} code ${VC}"

      - name: Download Gradle wrapper jar
        run: |
          mkdir -p SmallBizApp/gradle/wrapper
          curl -sL "https://github.com/gradle/gradle/raw/v8.4.0/gradle/wrapper/gradle-wrapper.jar" \
            -o SmallBizApp/gradle/wrapper/gradle-wrapper.jar
          chmod +x SmallBizApp/gradlew

      - name: Build APK
        working-directory: SmallBizApp
        run: ./gradlew assembleDebug --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false"

      - name: Prepare release files
        run: |
          mkdir -p out
          cp SmallBizApp/app/build/outputs/apk/debug/app-debug.apk "out/ToMegaPOS-v${{ steps.ver.outputs.vn }}.apk"
          ls -lh out/

      - name: Get changelog
        id: log
        run: |
          PREV=$(git tag --sort=-version:refname | grep -v '^smallbusiness$' | head -1 || echo "")
          if [ -z "$PREV" ]; then
            NOTES=$(git log --oneline -6 --pretty=format:"- %s")
          else
            NOTES=$(git log "${PREV}..HEAD" --oneline --pretty=format:"- %s")
          fi
          echo "notes<<ENDOFNOTES" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "ENDOFNOTES" >> $GITHUB_OUTPUT

      - name: Remove old release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ steps.ver.outputs.vn }}"
          gh release delete "$TAG" --yes --repo ${{ github.repository }} 2>/dev/null || true
          git push origin --delete "refs/tags/${TAG}" 2>/dev/null || true

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ steps.ver.outputs.vn }}"
          APK="out/ToMegaPOS-v${{ steps.ver.outputs.vn }}.apk"
          DATE=$(date -u '+%d %B %Y %H:%M UTC')
          NOTES="${{ steps.log.outputs.notes }}"

          gh release create "$TAG" "$APK" \
            --repo "${{ github.repository }}" \
            --title "ToMega POS v${{ steps.ver.outputs.vn }}" \
            --latest \
            --notes "## ToMega POS v${{ steps.ver.outputs.vn }}
Version Code: ${{ steps.ver.outputs.vc }}
Built: ${DATE}

### Changes
${NOTES}

### Install
1. Download the APK file below
2. Phone Settings > Security > Allow unknown sources
3. Open the APK and install
4. Your data is preserved automatically

Phones already running ToMega POS will be notified automatically."

          echo "Released: $TAG"

      - name: Update smallbusiness tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git push origin --delete refs/tags/smallbusiness 2>/dev/null || true
          git tag -f smallbusiness
          git push origin refs/tags/smallbusiness --force

      - name: Summary
        run: |
          echo "## ToMega POS v${{ steps.ver.outputs.vn }} released" >> $GITHUB_STEP_SUMMARY
          echo "Release: https://github.com/${{ github.repository }}/releases/tag/v${{ steps.ver.outputs.vn }}" >> $GITHUB_STEP_SUMMARY
